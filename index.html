<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Lottery</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    window.addEventListener('load', () => {
      const firebaseConfig = {
        apiKey: "AIzaSyBXeD8SMXHnqhNDg01Rlm4fC1t05Eb4NFs",
        authDomain: "smart-lottery-b08c5.firebaseapp.com",
        projectId: "smart-lottery-b08c5",
        storageBucket: "smart-lottery-b08c5.appspot.com",
        messagingSenderId: "1038545058004",
        appId: "1:1038545058004:web:65b29c57eda2939f18e341",
        measurementId: "G-SH9Y19ZE74"
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      window.handleLogin = async function () {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        try {
          const userCredential = await auth.signInWithEmailAndPassword(email, password);
          const user = userCredential.user;
          await db.collection("users").doc(user.uid).update({ lastLogin: new Date() });
          alert("Login successful!");
          loadContests();
        } catch (error) {
          alert("Login Error: " + error.message);
        }
      }

      window.handleRegister = async function () {
        const name = document.getElementById('register-name').value;
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        const confirm = document.getElementById('register-confirm').value;

        if (password !== confirm) {
          alert("Passwords do not match.");
          return;
        }
        try {
          const userCredential = await auth.createUserWithEmailAndPassword(email, password);
          const user = userCredential.user;

          await db.collection("users").doc(user.uid).set({
            email: email,
            balance: 0,
            isAdmin: false,
            createdAt: new Date(),
            lastLogin: new Date()
          });

          alert("Registration successful!");
          loadContests();
        } catch (error) {
          alert("Register Error: " + error.message);
        }
      }

      window.seedContests = async function () {
        const contests = [
          {
            name: "Daily Lottery",
            entryFee: 50,
            prize: 5000,
            participants: 0,
            status: "active",
            endTime: "2025-06-18",
            winnerId: ""
          },
          {
            name: "Weekly Jackpot",
            entryFee: 100,
            prize: 15000,
            participants: 0,
            status: "active",
            endTime: "2025-06-22",
            winnerId: ""
          },
          {
            name: "Mega Draw",
            entryFee: 20,
            prize: 20000,
            participants: 0,
            status: "active",
            endTime: "2025-06-30",
            winnerId: ""
          }
        ];

        for (const contest of contests) {
          await db.collection('contests').add(contest);
        }
        alert("Contests added successfully to Firestore.");
      }

      window.loadContests = function () {
        const contestGrid = document.getElementById('contest-grid');
        db.collection('contests').where('status', '==', 'active').onSnapshot(snapshot => {
          contestGrid.innerHTML = '';
          snapshot.forEach(doc => {
            const contest = doc.data();
            const id = doc.id;

            const card = document.createElement('div');
            card.className = 'contest-card';
            card.innerHTML = `
              <div class="contest-header green">
                <div class="contest-title">${contest.name}</div>
                <div class="contest-prize">₹${contest.prize}</div>
              </div>
              <div class="contest-body">
                <div class="contest-info">
                  <div class="contest-info-item">
                    <div class="contest-info-label">Entry Fee</div>
                    <div class="contest-info-value">₹${contest.entryFee}</div>
                  </div>
                  <div class="contest-info-item">
                    <div class="contest-info-label">Participants</div>
                    <div class="contest-info-value">${contest.participants}</div>
                  </div>
                </div>
                <div class="contest-actions">
                  <button class="btn btn-small" onclick="joinContest(auth.currentUser.uid, '${id}', { joinedAt: new Date() })">
                    Join Contest
                  </button>
                </div>
              </div>
            `;
            contestGrid.appendChild(card);
          });
        });
      }

      window.joinContest = async function(userId, contestId, entryData) {
        try {
          await db.collection('contests').doc(contestId).collection('entries').doc(userId).set(entryData);
          await db.collection('contests').doc(contestId).update({
            participants: firebase.firestore.FieldValue.increment(1)
          });
          console.log("Contest entry recorded");
        } catch (error) {
          console.error("Error joining contest:", error);
        }
      }
    });
  </script>
</head>
<body>
  <h1>Smart Lottery App</h1>
  
    <button onclick="seedContests()" style="margin: 10px; padding: 10px; background-color: green; color: white; border: none; border-radius: 5px;">
      Seed Contests to Firestore
    </button>
    <div id="contest-grid"></div>
    
</body>
</html>
