<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lottery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Razorpay Payment Integration -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #ff6584;
            --dark: #2d3748;
            --light: #f7fafc;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .auth-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .auth-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .auth-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .auth-form {
            padding: 30px;
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .auth-btn:hover {
            background: #5a52e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.3);
        }
        
        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .auth-toggle span {
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .auth-toggle span:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        
        .divider::before {
            margin-right: 10px;
        }
        
        .divider::after {
            margin-left: 10px;
        }
        
        .forgot-password {
            text-align: right;
            margin-top: -15px;
            margin-bottom: 20px;
        }
        
        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            animation: modalFadeIn 0.3s ease;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes modalFadeIn {
            from { 
                opacity: 0;
                transform: translateY(-20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive adjustments */
        @media (max-width: 480px) {
            .auth-container {
                border-radius: 10px;
            }
            
            .auth-header {
                padding: 20px;
            }
            
            .auth-form {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Welcome to Smart Lottery</h1>
            <p>Play and win exciting prizes!</p>
        </div>
        
        <!-- Login Form -->
        <div id="login-form" class="auth-form active">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" class="form-control" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" class="form-control" placeholder="Enter your password">
                <div class="forgot-password">
                    <a href="#" id="forgot-password-link">Forgot password?</a>
                </div>
            </div>
            <button id="loginBtn" class="auth-btn">Login</button>
            <div class="divider">or</div>
            <p class="auth-toggle">Don't have an account? <span id="show-signup">Sign up</span></p>
            <p id="login-error" class="error-message"></p>
        </div>
        
        <!-- Signup Form -->
        <div id="signup-form" class="auth-form">
            <div class="form-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" class="form-control" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" class="form-control" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="signup-password">Password (min 6 characters)</label>
                <input type="password" id="signup-password" class="form-control" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label for="signup-confirm">Confirm Password</label>
                <input type="password" id="signup-confirm" class="form-control" placeholder="Confirm your password">
            </div>
            <button id="signupBtn" class="auth-btn">Create Account</button>
            <div class="divider">or</div>
            <p class="auth-toggle">Already have an account? <span id="show-login">Login</span></p>
            <p id="signup-error" class="error-message"></p>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div id="reset-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Reset Password</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="form-group">
                <label for="reset-email">Email Address</label>
                <input type="email" id="reset-email" class="form-control" placeholder="Enter your registered email">
            </div>
            <button id="reset-btn" class="auth-btn">Send Reset Link</button>
            <p id="reset-message" class="error-message" style="text-align: center; margin-top: 15px;"></p>
        </div>
    </div>

    <!-- Payment Modal (Will be shown after login) -->
    <div id="payment-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add Money to Wallet</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="form-group">
                <label>Select Amount (₹)</label>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="amount-btn" data-amount="100">100</button>
                    <button class="amount-btn" data-amount="500">500</button>
                    <button class="amount-btn" data-amount="1000">1000</button>
                </div>
            </div>
            <div class="form-group">
                <label for="custom-amount">Or Enter Custom Amount</label>
                <input type="number" id="custom-amount" class="form-control" placeholder="Enter amount in ₹">
            </div>
            <button id="proceed-payment" class="auth-btn">Proceed to Pay</button>
            <p id="payment-message" style="text-align: center; margin-top: 15px; color: #666;">
                Secure payments via Razorpay
            </p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration (REPLACE WITH YOUR ACTUAL CONFIG)
        const firebaseConfig = {
      apiKey: "AIzaSyBXeD8SMXHnqhNDg01Rlm4fC1t05Eb4NFs",
      authDomain: "smart-lottery-b08c5.firebaseapp.com",
      projectId: "smart-lottery-b08c5",
      storageBucket: "smart-lottery-b08c5.appbasestorage.app",
      messagingSenderId: "1038545058004",
      appId: "1:1038545058004:web:65b29c57eda2939f18e341",
      measurementId: "G-SH9Y19ZE74"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const showSignup = document.getElementById('show-signup');
        const showLogin = document.getElementById('show-login');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const loginError = document.getElementById('login-error');
        const signupError = document.getElementById('signup-error');
        const forgotPasswordLink = document.getElementById('forgot-password-link');
        const resetModal = document.getElementById('reset-modal');
        const resetBtn = document.getElementById('reset-btn');
        const resetMessage = document.getElementById('reset-message');
        const closeModalButtons = document.querySelectorAll('.close-modal');

        // Payment Elements
        const paymentModal = document.getElementById('payment-modal');
        const amountButtons = document.querySelectorAll('.amount-btn');
        const customAmountInput = document.getElementById('custom-amount');
        const proceedPaymentBtn = document.getElementById('proceed-payment');

        // Toggle between login and signup forms
        showSignup.addEventListener('click', () => {
            loginForm.classList.remove('active');
            signupForm.classList.add('active');
        });

        showLogin.addEventListener('click', () => {
            signupForm.classList.remove('active');
            loginForm.classList.add('active');
        });

        // Login Handler
        loginBtn.addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                loginError.textContent = 'Please enter both email and password';
                return;
            }
            
            loginError.textContent = '';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    // Login successful - redirect to main app page
                    window.location.href = 'home.html';
                })
                .catch(error => {
                    console.error("Login error:", error);
                    loginError.textContent = error.message;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                });
        });

        // Signup Handler
        signupBtn.addEventListener('click', () => {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            
            // Validation
            if (!name || !email || !password || !confirm) {
                signupError.textContent = 'All fields are required';
                return;
            }
            
            if (password !== confirm) {
                signupError.textContent = 'Passwords do not match';
                return;
            }
            
            if (password.length < 6) {
                signupError.textContent = 'Password must be at least 6 characters';
                return;
            }

            signupError.textContent = '';
            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating account...';
            
            // Create user
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Add user data to Firestore
                    return db.collection('users').doc(userCredential.user.uid).set({
                        name: name,
                        email: email,
                        balance: 100, // Starting bonus of ₹100
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    // Redirect to main app page
                    window.location.href = 'home.html';
                })
                .catch(error => {
                    console.error("Signup error:", error);
                    signupError.textContent = error.message;
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Create Account';
                });
        });

        // Password Reset Flow
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            resetModal.style.display = 'flex';
            document.getElementById('reset-email').value = document.getElementById('login-email').value;
        });

        resetBtn.addEventListener('click', () => {
            const email = document.getElementById('reset-email').value;
            
            if (!email) {
                resetMessage.textContent = 'Please enter your email';
                resetMessage.style.color = '#e74c3c';
                return;
            }
            
            resetMessage.textContent = 'Sending reset link...';
            resetMessage.style.color = '#666';
            resetBtn.disabled = true;
            
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    resetMessage.textContent = 'Password reset link sent to your email!';
                    resetMessage.style.color = '#48bb78';
                    setTimeout(() => {
                        resetModal.style.display = 'none';
                        resetBtn.disabled = false;
                        resetMessage.textContent = '';
                    }, 3000);
                })
                .catch(error => {
                    console.error("Reset error:", error);
                    resetMessage.textContent = error.message;
                    resetMessage.style.color = '#e74c3c';
                    resetBtn.disabled = false;
                });
        });

        // Payment System
        function initPaymentSystem() {
            // Amount selection
            amountButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    amountButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    customAmountInput.value = '';
                });
            });
            
            customAmountInput.addEventListener('input', () => {
                amountButtons.forEach(b => b.classList.remove('active'));
            });
            
            // Proceed to payment
            proceedPaymentBtn.addEventListener('click', () => {
                let amount = 0;
                const activeBtn = document.querySelector('.amount-btn.active');
                
                if (activeBtn) {
                    amount = parseInt(activeBtn.dataset.amount);
                } else if (customAmountInput.value) {
                    amount = parseInt(customAmountInput.value);
                }
                
                if (!amount || amount < 10) {
                    alert('Please enter a valid amount (minimum ₹10)');
                    return;
                }
                
                processPayment(amount);
            });
        }

        function processPayment(amount) {
            // In a real app, you would call your backend to create a Razorpay order
            // This is a mock implementation for demonstration
            
            proceedPaymentBtn.disabled = true;
            proceedPaymentBtn.textContent = 'Processing...';
            
            // Mock order creation (replace with actual API call)
            setTimeout(() => {
                const options = {
                    key: 'rzp_test_YOUR_RAZORPAY_KEY', // Replace with your Razorpay key
                    amount: amount * 100, // Razorpay expects amount in paise
                    currency: 'INR',
                    name: 'Smart Lottery',
                    description: 'Add Money to Wallet',
                    image: 'https://your-logo-url.com/logo.png',
                    handler: function(response) {
                        // On successful payment
                        updateUserBalance(amount);
                        paymentModal.style.display = 'none';
                    },
                    prefill: {
                        email: auth.currentUser.email,
                        name: auth.currentUser.displayName || 'User'
                    },
                    theme: {
                        color: '#6c63ff'
                    }
                };
                
                const rzp = new Razorpay(options);
                rzp.open();
                
                rzp.on('payment.failed', function(response) {
                    alert('Payment failed. Please try again.');
                    console.error(response.error);
                });
                
                proceedPaymentBtn.disabled = false;
                proceedPaymentBtn.textContent = 'Proceed to Pay';
            }, 1000);
        }

        function updateUserBalance(amount) {
            if (!auth.currentUser) return;
            
            db.collection('users').doc(auth.currentUser.uid).update({
                balance: firebase.firestore.FieldValue.increment(amount)
            })
            .then(() => {
                alert(`₹${amount} successfully added to your wallet!`);
            })
            .catch(error => {
                console.error("Balance update error:", error);
                alert('Error updating balance. Please contact support.');
            });
        }

        // Close modals
        closeModalButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.modal').forEach(modal => {
                    modal.style.display = 'none';
                });
            });
        });

        // Initialize payment system after login
        auth.onAuthStateChanged(user => {
            if (user) {
                initPaymentSystem();
                // Check if we're on the home page to show payment modal
                if (window.location.pathname.includes('home.html')) {
                    document.getElementById('addFundsBtn').addEventListener('click', () => {
                        paymentModal.style.display = 'flex';
                    });
                } else {
                    // Redirect to home page if already logged in
                    window.location.href = 'home.html';
                }
            }
        });

        // Close modals when clicking outside
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });
    </script>
</body>
</html>
